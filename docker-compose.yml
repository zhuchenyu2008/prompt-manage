version: '3.8'

services:
  prompt-manager:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3501:3501"
    volumes:
      - prompt-data:/app/data
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:?set SECRET_KEY before starting prompt-manager}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-0}
    restart: unless-stopped

volumes:
  prompt-data:
